<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thread Video Cutter — Timeline Editor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f0f;color:#e0e0e0;font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}

/* Top bar */
.top{display:flex;align-items:center;gap:8px;padding:5px 12px;background:#1a1a1a;border-bottom:1px solid #2a2a2a;flex-shrink:0}
.top h1{font-size:13px;font-weight:600;color:#666}
.btn{padding:4px 10px;border:1px solid #3a3a3a;background:#222;color:#ccc;border-radius:5px;cursor:pointer;font-size:10px;transition:.15s;white-space:nowrap}
.btn:hover{background:#333;border-color:#555}
.btn.pri{background:#2563eb;border-color:#2563eb;color:#fff}
.btn.on{background:#374151;border-color:#60a5fa;color:#60a5fa}
.top .sep{width:1px;height:20px;background:#2a2a2a}
.top .info{font-size:10px;color:#555}

/* Tool buttons */
.tools{display:flex;gap:2px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:2px}
.tool-btn{padding:4px 8px;border:none;background:transparent;color:#888;border-radius:4px;cursor:pointer;font-size:11px;transition:.1s}
.tool-btn:hover{background:#333;color:#ccc}
.tool-btn.active{background:#2563eb;color:#fff}

/* Transport */
.transport{display:flex;align-items:center;gap:4px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:2px 6px}
.transport .tbtn{width:26px;height:24px;border:none;background:transparent;color:#888;border-radius:3px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.transport .tbtn:hover{background:#333;color:#fff}
.transport .tbtn.playing{color:#22c55e}
.tc{font-size:12px;font-variant-numeric:tabular-nums;color:#ccc;font-weight:600;min-width:70px;text-align:center;font-family:'SF Mono',monospace}
.speed-badge{font-size:9px;color:#fbbf24;padding:1px 5px;background:#422006;border-radius:3px;display:none}
.speed-badge.show{display:inline}

/* Upper */
.upper{display:flex;flex:1;min-height:0;position:relative}
.resizer-h{width:5px;cursor:col-resize;background:transparent;flex-shrink:0;z-index:20}
.resizer-h:hover,.resizer-h.drag{background:#2563eb}
.resizer-v{height:5px;cursor:row-resize;background:transparent;flex-shrink:0;z-index:20}
.resizer-v:hover,.resizer-v.drag{background:#2563eb}

/* Preview */
.pv{width:600px;min-width:180px;max-width:600px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#080808;flex-shrink:0;position:relative}
.phone{width:432px;height:768px;background:#000;border-radius:12px;overflow:hidden;position:relative;border:2px solid #2a2a2a}
.phone video{width:100%;height:100%;object-fit:cover;position:relative;z-index:1}
.phone .vid-blur-bg{display:none!important}
.phone.letterbox video{object-fit:contain;z-index:1;background:#000}
/* Crop overlay */
.crop-overlay{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:5;display:none}
.crop-overlay.active{display:block;pointer-events:auto;cursor:crosshair}
.crop-dim{position:absolute;background:rgba(0,0,0,.55)}
.crop-rect{position:absolute;border:2px dashed #fbbf24;z-index:1}
.crop-handle{position:absolute;width:10px;height:10px;background:#fbbf24;border-radius:2px;z-index:2;cursor:nwse-resize}
.crop-handle.tl{top:-5px;left:-5px;cursor:nwse-resize}
.crop-handle.tr{top:-5px;right:-5px;cursor:nesw-resize}
.crop-handle.bl{bottom:-5px;left:-5px;cursor:nesw-resize}
.crop-handle.br{bottom:-5px;right:-5px;cursor:nwse-resize}
.sub-ov{position:absolute;left:0;right:0;top:0;bottom:0;pointer-events:none;transition:opacity .2s;z-index:3}
.sub-ov.h{opacity:0}
.sub-tx{position:absolute;background:rgba(0,0,0,.6);color:#fff;font-weight:700;padding:4px 12px;border-radius:6px;letter-spacing:.5px;max-width:90%;word-break:keep-all;pointer-events:auto;cursor:grab;white-space:nowrap;transition:left .08s ease-out,top .08s ease-out;will-change:left,top}
.sub-tx:active{cursor:grabbing}
.sub-tx.sub-active{outline:2px solid #4ade80;outline-offset:2px}
/* In/Out marks */
.mark-badge{position:absolute;top:8px;font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600}
.mark-in{left:8px;background:#059669;color:#fff}
.mark-out{right:8px;background:#dc2626;color:#fff}

/* Detail */
.detail{flex:1;display:flex;flex-direction:column;border-left:1px solid #2a2a2a;min-width:0}
.detail-head{padding:6px 12px;background:#1a1a1a;border-bottom:1px solid #2a2a2a;font-size:11px;color:#666;display:flex;align-items:center;gap:6px}
.detail-body{flex:1;overflow-y:auto;padding:10px 12px;font-size:11px}
.d-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.d-row label{font-size:10px;color:#555;width:46px;flex-shrink:0}
.d-row span{color:#aaa}
.d-row input[type=number]{width:64px;background:#222;border:1px solid #3a3a3a;color:#ddd;padding:3px 5px;border-radius:4px;font-size:10px;text-align:center}
.d-row input:focus{outline:none;border-color:#2563eb}
.d-row select{background:#222;border:1px solid #3a3a3a;color:#ddd;padding:3px 5px;border-radius:4px;font-size:10px}
.sub-input{width:100%;background:#222;border:1px solid #3a3a3a;color:#ddd;padding:5px 8px;border-radius:5px;font-size:11px}
.sub-input:focus{outline:none;border-color:#2563eb}
.d-section{margin-top:10px;padding-top:8px;border-top:1px solid #1e1e1e}
.d-section h4{font-size:10px;color:#555;margin-bottom:6px;font-weight:500}

/* ─── Timeline (Remotion-inspired) ─── */
.tl-panel{height:280px;min-height:120px;max-height:500px;background:#0c0c0c;flex-shrink:0;display:flex;flex-direction:column;border-top:1px solid #222}

.tl-toolbar{display:flex;align-items:center;gap:8px;padding:6px 14px;background:#141414;border-bottom:1px solid #1e1e1e;flex-shrink:0}
.tl-toolbar label{font-size:10px;color:#666}
.tl-toolbar input[type=range]{width:90px;accent-color:#0a84ff;height:3px}
.tl-toolbar .snap-btn{font-size:10px}
.tl-toolbar .btn{font-size:10px;padding:3px 10px;border-radius:6px;border:1px solid #333;background:#1a1a1a;color:#aaa;transition:all .15s}
.tl-toolbar .btn:hover{background:#222;color:#ddd;border-color:#444}
.tl-toolbar .btn.active,.tl-toolbar .fmt-btn[style*="border-color:#60a5fa"]{background:#1e3a5f;color:#60a5fa;border-color:#2563eb}

/* Ruler — Remotion style */
.tl-ruler{height:26px;background:#111;border-bottom:1px solid #1e1e1e;position:relative;overflow:hidden;cursor:pointer;flex-shrink:0}
.tl-ruler-tick{position:absolute;bottom:0;border-left:1px solid #282828}
.tl-ruler-label{position:absolute;top:5px;font-size:9px;color:#555;transform:translateX(3px);font-variant-numeric:tabular-nums;font-family:'SF Mono',Menlo,monospace;letter-spacing:-0.3px}

/* Scroll area */
.tl-scroll{flex:1;overflow-x:auto;overflow-y:hidden;position:relative}
.tl-track-area{position:relative;min-height:100%}

/* Track headers — Remotion sidebar */
.tl-headers{position:absolute;left:0;top:0;bottom:0;width:64px;background:#111;border-right:1px solid #1e1e1e;z-index:10;display:flex;flex-direction:column}
.tl-h-item{padding:0 8px;border-bottom:1px solid #1a1a1a;font-size:10px;color:#666;display:flex;align-items:center;gap:5px;font-weight:500;letter-spacing:0.2px}
.tl-h-item:hover{color:#999}

/* Playhead — Remotion red pointer */
.tl-playhead{position:absolute;top:0;width:2px;background:#ff3b30;z-index:20;height:100%;cursor:col-resize;filter:drop-shadow(0 0 4px rgba(255,59,48,.4))}
.tl-playhead::before{content:'';position:absolute;top:-2px;left:-6px;width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-top:8px solid #ff3b30;filter:drop-shadow(0 1px 3px rgba(255,59,48,.5))}
.tl-playhead::after{content:'';position:absolute;top:0;bottom:0;left:-8px;width:18px;cursor:col-resize}

/* Skim indicator */
.tl-skim{position:absolute;top:0;width:1px;background:rgba(255,255,255,.2);z-index:15;pointer-events:none;height:100%;display:none}

/* Tracks — Remotion spacing */
.tl-track{position:relative;margin-left:64px;border-bottom:1px solid #161616}
.tl-track.v1{height:56px}
.tl-track.sub{min-height:26px}
.tl-track.audio{height:36px}

/* Clips — Remotion rounded blocks */
.tl-clip{position:absolute;top:4px;bottom:4px;border-radius:6px;cursor:pointer;overflow:hidden;transition:box-shadow .1s,transform .15s,opacity .15s;min-width:8px;border:1px solid rgba(255,255,255,.08)}
.tl-clip:hover{box-shadow:0 0 0 1px rgba(255,255,255,.2);border-color:rgba(255,255,255,.15)}
.tl-clip.active{box-shadow:0 0 0 2px rgba(255,255,255,.9);border-color:transparent}
.tl-clip.dragging{opacity:.4;transform:scale(.97);z-index:30}
.tl-clip.drag-over-left{border-left:3px solid #0a84ff!important;border-radius:0 6px 6px 0}
.tl-clip.drag-over-right{border-right:3px solid #0a84ff!important;border-radius:6px 0 0 6px}
.tl-drop-indicator{position:absolute;top:0;bottom:0;width:3px;background:#0a84ff;border-radius:2px;z-index:25;pointer-events:none;display:none;box-shadow:0 0 10px rgba(10,132,255,.5)}
.tl-clip.blade-hover{box-shadow:none!important}
.tl-clip-inner{padding:0 8px;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;overflow:hidden;position:relative;z-index:1}
.tl-clip-name{font-size:10px;color:rgba(255,255,255,.9);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 2px rgba(0,0,0,.4)}
.tl-clip-sub{font-size:9px;color:rgba(255,255,255,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.tl-clip-dur{font-size:9px;color:rgba(255,255,255,.4);position:absolute;right:6px;top:4px;font-family:'SF Mono',Menlo,monospace;font-variant-numeric:tabular-nums}
/* Trim handles — Remotion style rounded edges */
.tl-trim{position:absolute;top:0;bottom:0;width:8px;cursor:ew-resize;z-index:5;transition:background .1s}
.tl-trim:hover{background:rgba(255,255,255,.15)}
.tl-trim.left{left:0;border-radius:6px 0 0 6px}
.tl-trim.left::after{content:'';position:absolute;top:50%;left:2px;transform:translateY(-50%);width:3px;height:14px;border-left:1px solid rgba(255,255,255,.3);border-right:1px solid rgba(255,255,255,.3)}
.tl-trim.right{right:0;border-radius:0 6px 6px 0}
.tl-trim.right::after{content:'';position:absolute;top:50%;right:2px;transform:translateY(-50%);width:3px;height:14px;border-left:1px solid rgba(255,255,255,.3);border-right:1px solid rgba(255,255,255,.3)}
/* Blade cursor */
.blade-cursor .tl-clip{cursor:crosshair!important}
/* Blade line */
.blade-line{position:absolute;top:0;bottom:0;width:2px;background:#fbbf24;z-index:6;pointer-events:none;display:none;box-shadow:0 0 8px rgba(251,191,36,.4)}

/* Audio waveform track */
.tl-audio-clip{position:absolute;top:3px;bottom:3px;border-radius:5px;overflow:hidden;opacity:.45}
.tl-audio-clip canvas{width:100%;height:100%}

/* Subtitle clips — Remotion caption style */
.tl-sub-clip{position:absolute;top:1px;height:22px;background:rgba(250,204,21,.1);border:1px solid rgba(250,204,21,.2);border-radius:5px;display:flex;align-items:center;padding:0 7px;font-size:9px;color:#c9960f;overflow:hidden;white-space:nowrap;cursor:grab;transition:background .1s}
.tl-sub-clip:hover{background:rgba(250,204,21,.18)}
.tl-sub-clip.sel{background:rgba(250,204,21,.3);border-color:rgba(250,204,21,.6);box-shadow:0 0 4px rgba(250,204,21,.3)}
.tl-sub-clip:active{cursor:grabbing}
.tl-sub-clip .sub-trim{position:absolute;top:0;bottom:0;width:6px;cursor:ew-resize;z-index:2}
.tl-sub-clip .sub-trim.left{left:0;border-radius:5px 0 0 5px}
.tl-sub-clip .sub-trim.right{right:0;border-radius:0 5px 5px 0}
.tl-sub-clip .sub-trim:hover{background:rgba(250,204,21,.3)}

/* Snap line */
.snap-line{position:absolute;top:0;bottom:0;width:1px;background:#fbbf24;z-index:18;pointer-events:none;display:none}

/* Colors — high-contrast Remotion-style palette */
.s0{background:linear-gradient(135deg,#3b82f6 0%,#2563eb 100%)}
.s1{background:linear-gradient(135deg,#a855f7 0%,#7c3aed 100%)}
.s2{background:linear-gradient(135deg,#10b981 0%,#059669 100%)}
.s3{background:linear-gradient(135deg,#f59e0b 0%,#d97706 100%)}
.s4{background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%)}
.s5{background:linear-gradient(135deg,#06b6d4 0%,#0891b2 100%)}

/* Transition overlays */
.tl-transition{position:absolute;top:0;bottom:0;background:repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.05) 2px,rgba(255,255,255,.05) 4px);border-radius:5px;pointer-events:none;z-index:2}

/* Format guide */
.fmt-guide{position:absolute;top:0;bottom:0;border-right:2px dashed rgba(245,158,11,.6);z-index:16;pointer-events:none}
.fmt-guide-label{position:absolute;top:4px;right:6px;font-size:9px;color:#f59e0b;background:#1a1a1a;padding:2px 6px;border-radius:4px;white-space:nowrap;font-family:'SF Mono',Menlo,monospace}
.fmt-overflow{position:absolute;top:0;bottom:0;background:rgba(239,68,68,.06);z-index:1;pointer-events:none}
.tl-clip.overflow{opacity:.3}

/* Render dialog */
.render-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:center;justify-content:center}
.render-overlay.show{display:flex}
.render-dialog{background:#1e1e1e;border:1px solid #3a3a3a;border-radius:12px;padding:24px 32px;min-width:320px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.render-dialog h3{font-size:14px;color:#e0e0e0;margin-bottom:16px}
.render-progress{width:100%;height:6px;background:#333;border-radius:3px;overflow:hidden;margin-bottom:10px}
.render-progress-bar{height:100%;background:#2563eb;border-radius:3px;transition:width .3s ease}
.render-status{font-size:11px;color:#888;margin-bottom:4px}
.render-detail{font-size:10px;color:#555;margin-bottom:16px}
.render-dialog .btn{min-width:80px}
.render-spinner{display:inline-block;width:20px;height:20px;border:2px solid #333;border-top-color:#2563eb;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.render-done-icon{font-size:32px;margin-bottom:8px}

/* Source selector overlay */
.src-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#0f0f0f;z-index:200;display:flex;align-items:center;justify-content:center}
.src-overlay.hidden{display:none}
.src-panel{width:640px;max-height:80vh;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:24px;overflow-y:auto}
.src-panel h2{font-size:16px;color:#e0e0e0;margin-bottom:4px}
.src-panel p{font-size:11px;color:#666;margin-bottom:16px}
.src-list{display:flex;flex-direction:column;gap:4px;margin-bottom:16px;min-height:60px;border:2px dashed transparent;border-radius:8px;padding:4px;transition:border-color .2s}
.src-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#222;border:1px solid #333;border-radius:6px;cursor:grab;transition:.1s}
.src-item:hover{border-color:#555}
.src-item.selected{border-color:#2563eb;background:#1e293b}
.src-item .src-thumb{width:40px;height:70px;object-fit:cover;border-radius:4px;background:#111;flex-shrink:0}
.src-item .src-check{width:16px;height:16px;accent-color:#2563eb}
.src-item .src-idx{font-size:10px;color:#555;width:20px;text-align:center}
.src-item .src-name{flex:1;font-size:12px;color:#ccc;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.src-item .src-meta{font-size:10px;color:#666}
.src-item .src-drag{color:#444;cursor:grab;font-size:14px}
.src-dropzone{border:2px dashed #444;border-radius:8px;padding:24px;text-align:center;color:#666;font-size:12px;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:16px}
.src-dropzone:hover{border-color:#2563eb;background:#1a1a2e}
.src-dropzone.dragover{border-color:#2563eb;background:#1a1a2e}
.src-options{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;padding:12px;background:#161616;border-radius:8px}
.src-options label{font-size:10px;color:#888;display:flex;flex-direction:column;gap:4px}
.src-options input,.src-options select{background:#222;border:1px solid #3a3a3a;color:#ddd;padding:4px 8px;border-radius:4px;font-size:11px}
.src-actions{display:flex;gap:8px;justify-content:flex-end}
.src-actions .btn{padding:8px 20px;font-size:12px}
.src-loading{text-align:center;padding:20px;color:#888;font-size:12px}
.proj-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#222;border:1px solid #333;border-radius:6px;cursor:pointer;transition:.15s}
.proj-item:hover{border-color:#2563eb;background:#1e293b}
.proj-item .proj-info{flex:1}
.proj-item .proj-name{font-size:12px;color:#e0e0e0;font-weight:600}
.proj-item .proj-meta{font-size:10px;color:#666;margin-top:2px}
.proj-item .proj-del{color:#666;font-size:11px;padding:4px 8px;border-radius:4px;cursor:pointer}
.proj-item .proj-del:hover{color:#f87171;background:#2a1a1a}

::-webkit-scrollbar{height:8px;width:6px}::-webkit-scrollbar-track{background:#0c0c0c}::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:4px}::-webkit-scrollbar-thumb:hover{background:#3a3a3a}
@font-face{font-family:'Montserrat';src:local('Montserrat ExtraBold'),local('Montserrat-ExtraBold'),local('Montserrat Bold'),local('Montserrat-Bold');font-weight:700}
@font-face{font-family:'Bebas Neue';src:local('Bebas Neue Regular'),local('BebasNeue-Regular');font-weight:400}
@font-face{font-family:'Jost';src:local('Jost ExtraBold'),local('Jost-ExtraBold'),local('Jost Bold'),local('Jost-Bold');font-weight:700}
</style>
</head>
<body>

<div class="src-overlay" id="srcOverlay">
  <div class="src-panel">
    <h2 style="font-size:16px;color:#e0e0e0;margin-bottom:4px">📁 프로젝트</h2>
    <p style="font-size:11px;color:#555;margin-bottom:16px">텔레그램으로 영상 경로 + 컨셉을 보내면 새 프로젝트가 생성됩니다</p>
    <div class="src-list" id="projectList"><div class="src-loading">프로젝트 불러오는 중...</div></div>
    <div class="src-actions" style="margin-top:12px">
      <button class="btn" onclick="skipToEditor()">기존 편집 유지 →</button>
    </div>

    <hr style="border:none;border-top:1px solid #2a2a2a;margin:20px 0">
    <h2 style="font-size:16px;color:#e0e0e0;margin-bottom:4px">➕ 새 프로젝트</h2>
    <p style="font-size:11px;color:#555;margin-bottom:12px">영상을 선택하고 분석을 시작하세요</p>
    <div class="src-list" id="srcList"></div>
    <div class="src-dropzone" id="srcDropzone" onclick="document.getElementById('fileUpload').click()" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="this.classList.remove('dragover');handleFileDrop(event)">
      📂 영상/이미지 파일을 드래그하거나 클릭하여 추가
    </div>
    <input type="file" id="fileUpload" multiple accept="video/*,image/*" style="display:none" onchange="uploadFiles(this.files)">
    <div class="src-options">
      <label>프로젝트명<input type="text" id="projName" placeholder="새 프로젝트"></label>
      <label>최대 길이(초)<input type="number" id="optMaxDur" value="60" min="10" max="300"></label>
      <label>클립 최소(초)<input type="number" id="optClipMin" value="1.5" step="0.5" min="0.5"></label>
      <label>클립 최대(초)<input type="number" id="optClipMax" value="8" step="0.5" min="1"></label>
      <label>장면 감지<input type="range" id="optScene" value="30" min="10" max="80"></label>
      <label>자막<select id="optAutoSub"><option value="none">없음</option><option value="auto" selected>자동 생성</option><option value="srt">SRT 파일</option></select></label>
      <label>API Key<input type="text" id="optApiKey" placeholder="선택사항"></label>
      <label>자막 컨텍스트<input type="text" id="subContext" placeholder="영상 주제/분위기"></label>
    </div>

<script>
let CLIPS=[];
// Global subtitle list — each sub has its own timing, independent of clips
// SUBS = [{id, text, style:{size,x,y,font,bg,bgColor,bgAlpha,color}, start, end}]
let SUBS=[];
let curSubIdx=-1; // currently selected global subtitle index
let _subIdCounter=0;
function nextSubId(){return 'sub_'+(++_subIdCounter)+'_'+Date.now()}

// Convert legacy formats to global subs
function normSubs(){
  if(!SUBS||!SUBS.length)return;
  // Already global format?
  if(SUBS[0]&&typeof SUBS[0]==='object'&&!Array.isArray(SUBS[0])&&SUBS[0].start!==undefined)return;
  // Legacy: SUBS[clipIdx] = string | [{text,style}]
  const global=[];
  SUBS.forEach((s,i)=>{
    const clipStart=starts[i]||0;
    const clipEnd=clipStart+clipDur(i);
    if(!s)return;
    if(typeof s==='string'&&s){
      global.push({id:nextSubId(),text:s,style:{...subStyleDefault},start:clipStart,end:clipEnd});
    }else if(Array.isArray(s)){
      s.forEach(entry=>{
        if(!entry)return;
        if(typeof entry==='string'&&entry){
          global.push({id:nextSubId(),text:entry,style:{...subStyleDefault},start:clipStart,end:clipEnd});
        }else if(entry.text){
          global.push({id:nextSubId(),text:entry.text,style:entry.style||{...subStyleDefault},start:entry.start!=null?entry.start:clipStart,end:entry.end!=null?entry.end:clipEnd});
        }
      });
    }
  });
  SUBS=global;
}

function getClipSubs(i){
  if(!starts||!starts.length)return[];
  const cs=starts[i]||0;
  const ce=cs+(clipDur(i)||0);
  return SUBS.filter(s=>s.end>cs&&s.start<ce);
}
function getCurSub(){return SUBS[curSubIdx]||null}
function getSubById(id){return SUBS.find(s=>s.id===id)||null}
let _hasInitialData=false;
const API_BASE='http://localhost:8090';
const VBASE=API_BASE;
const srcDurs={};
const srcFps={}; // source → fps mapping

function apiUrl(path){
  if(/^https?:\/\//.test(path))return path;
  return `${API_BASE}${path.startsWith('/') ? path : `/${path}`}`;
}

// Per-clip crop data: {x,y,w,h} as 0~100% of frame (mask outside)
let clipCrops=[];
// Per-clip zoom data: {scale, panX, panY} scale=1~4, pan as % offset
let clipZooms=[];
let cropMode=false;

function cropOf(i){return clipCrops[i]||{x:0,y:0,w:100,h:100}}
function zoomOf(i){return clipZooms[i]||{scale:1,panX:0,panY:0}}

function applyCropToVideo(){
  // Crop = mask via clip-path (outside area = phone bg black)
  const vid=document.getElementById('vid');
  const c=cropOf(cur);
  if(c.x===0&&c.y===0&&c.w===100&&c.h===100){
    vid.style.clipPath='';
  } else {
    const l=c.x+'%', t=c.y+'%', r=(c.x+c.w)+'%', b=(c.y+c.h)+'%';
    vid.style.clipPath=`polygon(${l} ${t}, ${r} ${t}, ${r} ${b}, ${l} ${b})`;
  }
  applyZoomToVideo();
  updateCropInfo();
}

function applyZoomToVideo(){
  const vid=document.getElementById('vid');
  if(cur<0||cur>=clipZooms.length)return;
  const z=clipZooms[cur];
  if(!z||z.scale===undefined){vid.style.transform='';return}
  if(z.scale===1&&z.panX===0&&z.panY===0){
    vid.style.transform='';
    vid.style.transformOrigin='center center';
  } else {
    vid.style.transformOrigin='center center';
    vid.style.transform=`scale(${z.scale}) translate(${z.panX}%, ${z.panY}%)`;
  }
  updateZoomInfo();
  console.log(`[zoom] clip=${cur} scale=${z.scale} panX=${z.panX} panY=${z.panY}`,clipZooms.map((z,i)=>`${i}:${z.scale}`).join(' '));
}

function updateCropOverlay(){
  const c=cropOf(cur);
  const rect=document.getElementById('cropRect');
  rect.style.left=c.x+'%';rect.style.top=c.y+'%';

// Crop drag interaction
(function(){
  const overlay=document.getElementById('cropOverlay');
  const rectEl=document.getElementById('cropRect');

  // Draw new crop by dragging on overlay
  overlay.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('crop-handle')||e.target===rectEl)return;
    e.preventDefault();
    const phone=document.getElementById('phoneFrame');
    const pr=phone.getBoundingClientRect();
    const startPx=((e.clientX-pr.left)/pr.width)*100;
    const startPy=((e.clientY-pr.top)/pr.height)*100;
    const onMove=ev=>{
      const cx=((ev.clientX-pr.left)/pr.width)*100;
      const cy=((ev.clientY-pr.top)/pr.height)*100;
      const c=clipCrops[cur];
      c.x=Math.max(0,Math.min(startPx,cx));
      c.y=Math.max(0,Math.min(startPy,cy));
      c.w=Math.min(100-c.x,Math.abs(cx-startPx));
      c.h=Math.min(100-c.y,Math.abs(cy-startPy));
      updateCropOverlay();
    };
    const onUp=()=>{
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
      const c=clipCrops[cur];
      if(c.w<3||c.h<3){c.x=0;c.y=0;c.w=100;c.h=100}
      applyCropToVideo();updateCropOverlay();
    };
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });

  // Drag crop rect to move
  rectEl.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('crop-handle'))return;
    e.preventDefault();e.stopPropagation();
    const phone=document.getElementById('phoneFrame');
    const pr=phone.getBoundingClientRect();
    const c=clipCrops[cur];
    const ox=c.x,oy=c.y;
    const sx=e.clientX,sy=e.clientY;
    const onMove=ev=>{
      const dx=(ev.clientX-sx)/pr.width*100;
      const dy=(ev.clientY-sy)/pr.height*100;
      c.x=Math.max(0,Math.min(100-c.w,ox+dx));
      c.y=Math.max(0,Math.min(100-c.h,oy+dy));
      updateCropOverlay();
    };
    const onUp=()=>{
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
      applyCropToVideo();
    };
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });
  rectEl.style.cursor='move';

  // Corner resize handles
  document.querySelectorAll('.crop-handle').forEach(h=>{
    h.addEventListener('mousedown',e=>{
      e.preventDefault();e.stopPropagation();
      const corner=h.dataset.corner;
      const phone=document.getElementById('phoneFrame');
      const pr=phone.getBoundingClientRect();
      const c=clipCrops[cur];
      const orig={x:c.x,y:c.y,w:c.w,h:c.h};
      const onMove=ev=>{
        const mx=((ev.clientX-pr.left)/pr.width)*100;
        const my=((ev.clientY-pr.top)/pr.height)*100;
        if(corner==='tl'){
          c.x=Math.max(0,Math.min(orig.x+orig.w-5,mx));
          c.y=Math.max(0,Math.min(orig.y+orig.h-5,my));
          c.w=orig.x+orig.w-c.x;c.h=orig.y+orig.h-c.y;
        }else if(corner==='tr'){
          c.y=Math.max(0,Math.min(orig.y+orig.h-5,my));
          c.w=Math.max(5,Math.min(100-orig.x,mx-orig.x));
          c.h=orig.y+orig.h-c.y;
        }else if(corner==='bl'){
          c.x=Math.max(0,Math.min(orig.x+orig.w-5,mx));
          c.w=orig.x+orig.w-c.x;
          c.h=Math.max(5,Math.min(100-orig.y,my-orig.y));
        }else{
          c.w=Math.max(5,Math.min(100-c.x,mx-c.x));
          c.h=Math.max(5,Math.min(100-c.y,my-c.y));
        }
        updateCropOverlay();
      };
      const onUp=()=>{
        document.removeEventListener('mousemove',onMove);
        document.removeEventListener('mouseup',onUp);
        applyCropToVideo();
      };
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
    });
  });
})();

let subStyleDefault={size:16,x:50,y:80,font:"'Apple SD Gothic Neo',sans-serif",bg:true,bgColor:'#000000',bgAlpha:0.6,color:'#ffffff'};

function initSubDrag(e,idx){
  const phone=document.getElementById('phoneFrame');
  const rect=phone.getBoundingClientRect();
  const sub=SUBS[idx];
  if(!sub)return;
  const st=sub.style||(sub.style={...subStyleDefault});
  const startX=st.x,startY=st.y;
  const mx0=e.clientX,my0=e.clientY;
  const span=e.target.closest('.sub-tx')||e.target;
  span.style.transition='none'; // disable transition during drag
  span.style.cursor='grabbing';
  let rafId=0,latestEv=null;
  
  const tick=()=>{
    if(!latestEv)return;
    const dx=(latestEv.clientX-mx0)/rect.width*100;
    const dy=(latestEv.clientY-my0)/rect.height*100;
    st.x=Math.max(5,Math.min(95,startX+dx));
    st.y=Math.max(5,Math.min(95,startY+dy));
    span.style.left=st.x+'%';
    span.style.top=st.y+'%';
    document.getElementById('subPosInfo').textContent=`${Math.round(st.x)}%, ${Math.round(st.y)}%`;
    latestEv=null;
  };
  
  const onMove=ev=>{
    ev.preventDefault();
    latestEv=ev;
    cancelAnimationFrame(rafId);
    rafId=requestAnimationFrame(tick);
  };
  const onUp=()=>{
    cancelAnimationFrame(rafId);
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
    span.style.cursor='';
    applySubStyle();
  };
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
}

let cur=0,playing=false,gTime=0,playSpeed=1,_onTU=null,_playGen=0;
let starts=[],total=0;
let hist=[];
let pxPerSec=14;
let tool='select'; // select, trim, blade
let snapOn=true;
let markInT=null,markOutT=null;
const HDR=64; // header width
let activeFormat=0; // 0=full, 15, 30, 60

// Clip extra data
let clipMeta=[];
// Independent subtitle timing: {start: globalSec, end: globalSec} per subtitle
let subTiming=[]; // legacy compat — not used for global subs
let selectedSub=-1; // timeline selected subtitle index into SUBS[]

function save(){hist.push({c:JSON.parse(JSON.stringify(CLIPS)),s:JSON.parse(JSON.stringify(SUBS)),m:JSON.parse(JSON.stringify(clipMeta)),ss:JSON.parse(JSON.stringify(clipSubStyles)),cr:JSON.parse(JSON.stringify(clipCrops)),zm:JSON.parse(JSON.stringify(clipZooms))})}
function undo(){if(!hist.length)return;const h=hist.pop();CLIPS=h.c;SUBS=h.s;clipMeta=h.m;clipSubStyles=h.ss;clipCrops=h.cr;clipZooms=h.zm;recalc();renderTL();sel(Math.min(cur,CLIPS.length-1))}

function recalc(){
  let t=0;starts=CLIPS.map((c,i)=>{const s=t;const spd=clipMeta[i]?.speed||1;t+=(c.end-c.start)/spd;return s});total=t;
  document.getElementById('totalInfo').textContent=`${CLIPS.length} clips · ${total.toFixed(1)}s`;
  // Init subTiming if needed (default: match clip timing)
  while(subTiming.length<CLIPS.length){
    const i=subTiming.length;
    subTiming.push({start:starts[i]||0,end:(starts[i]||0)+clipDur(i)});
  }
  // Sync subTiming for clips that haven't been manually adjusted
  CLIPS.forEach((c,i)=>{
    if(!subTiming[i]._manual){
      subTiming[i].start=starts[i];
      subTiming[i].end=starts[i]+clipDur(i);
    }
  });
}

function fmt(s){const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+String(sec).padStart(2,'0')}
function tc(s){const m=Math.floor(s/60),sec=s%60;return String(m).padStart(2,'0')+':'+sec.toFixed(1).padStart(4,'0')}

/* ─── Tools ─── */
function setTool(t){

  document.querySelectorAll('.tool-btn').forEach(e=>e.classList.remove('active'));

  document.getElementById('tlScroll').classList.toggle('blade-cursor',t==='blade');

  if(t==='crop'){
    cropMode=true;
    document.getElementById('cropOverlay').classList.add('active');

    cropMode=false;
    document.getElementById('cropOverlay').classList.remove('active');
    document.getElementById('cropToggle').classList.remove('on');
  }
}

/* ─── Snap ─── */
function toggleSnap(){snapOn=!snapOn;document.getElementById('snapBtn').classList.toggle('on',snapOn)}
function getSnapPoints(){
  const pts=[0];
  CLIPS.forEach((c,i)=>{pts.push(starts[i]);pts.push(starts[i]+clipDur(i))});
  pts.push(total);
  return[...new Set(pts)];
}
function snapTo(t,threshold){
  if(!snapOn)return t;
  const pts=getSnapPoints();
  const thr=threshold||0.5;
  let best=t;
  pts.forEach(p=>{if(Math.abs(p-t)<thr&&Math.abs(p-t)<Math.abs(best-t))best=p});
  return best;
}
function clipDur(i){return(CLIPS[i].end-CLIPS[i].start)/(clipMeta[i]?.speed||1)}

/* ─── Timeline Render ─── */
function renderTL(){
  // Auto-assign source_idx if missing (based on unique source names)
  const srcNames=[...new Set(CLIPS.map(c=>c.source))];
  CLIPS.forEach(c=>{if(c.source_idx==null)c.source_idx=srcNames.indexOf(c.source)});

  const totalW=total*pxPerSec;
  document.getElementById('trackArea').style.width=(HDR+totalW+120)+'px';

  // Ruler
  const ruler=document.getElementById('ruler');
  ruler.innerHTML='';
  const step=pxPerSec>=20?1:pxPerSec>=10?2:5;
  for(let t=0;t<=total+step;t+=step){
    const x=HDR+t*pxPerSec;
    const tk=document.createElement('div');
    tk.className='tl-ruler-tick';tk.style.left=x+'px';
    tk.style.height=t%(step*2===0?step*2:step*5)===0?'100%':'40%';
    ruler.appendChild(tk);
    if(t%((step<=2)?step*2:step)===0){
      const lb=document.createElement('div');lb.className='tl-ruler-label';lb.style.left=x+'px';lb.textContent=fmt(t);
      ruler.appendChild(lb);
    }
  }

  // Video track
  const vt=document.getElementById('videoTrack');vt.innerHTML='';
  CLIPS.forEach((c,i)=>{
    const dur=clipDur(i);
    const x=starts[i]*pxPerSec;const w=Math.max(dur*pxPerSec,6);
    const div=document.createElement('div');
    div.className=`tl-clip s${c.source_idx%6}${i===cur?' active':''}`;
    div.style.left=x+'px';div.style.width=w+'px';div.id='tc-'+i;

    const nm=c.source.split('/').pop().replace(/\.\w+$/,'');
    const clipSubs=getClipSubs(i);
    const subText=clipSubs.map(s=>s.text).filter(Boolean).join(' / ');
    const spd=clipMeta[i]?.speed||1;
    div.innerHTML=`
      <div class="tl-trim left" data-i="${i}" data-side="left"></div>
      <div class="tl-clip-inner">
        <div class="tl-clip-name">${i+1}. ${nm}${spd!==1?' ('+spd+'x)':''}</div>
        ${subText?`<div class="tl-clip-sub">${subText}</div>`:''}
      </div>
      <div class="tl-clip-dur">${dur.toFixed(1)}s</div>
      <div class="tl-trim right" data-i="${i}" data-side="right"></div>
    `;

    // Transition overlay
    const tr=clipMeta[i]?.transition;
    if(tr&&tr!=='none'&&i>0){
      const td=clipMeta[i]?.transDur||0.3;
      const tw=td*pxPerSec;
      const to=document.createElement('div');to.className='tl-transition';
      to.style.left='0';to.style.width=tw+'px';
      div.appendChild(to);
    }

    div.addEventListener('mousedown',e=>{
      if(e.target.classList.contains('tl-trim'))return;
      if(tool==='blade'){bladeCut(e,i);return}
      sel(i);
      if(tool==='select')startClipDrag(e,i);
    });
    div.addEventListener('mousemove',e=>{
      if(tool==='blade')showBladeLine(e,i);
    });
    vt.appendChild(div);
  });

  // Sub track — each global subtitle as independent bar, multi-row for overlaps
  const st=document.getElementById('subTrack');st.innerHTML='';
  const subColors=['#4ade80','#60a5fa','#f59e0b','#ec4899','#a78bfa','#14b8a6'];
  const ROW_H=24;
  
  // Assign rows: greedy interval scheduling
  const rows=[]; // rows[r] = end time of last subtitle in that row
  const subRows=[];
  SUBS.forEach((sub,gi)=>{
    let placed=false;
    for(let r=0;r<rows.length;r++){
      if(sub.start>=rows[r]){rows[r]=sub.end;subRows[gi]=r;placed=true;break}
    }
    if(!placed){subRows[gi]=rows.length;rows.push(sub.end)}
  });
  const numRows=Math.max(1,rows.length);
  const trackH=numRows*ROW_H+2;
  st.style.height=trackH+'px';
  document.getElementById('subTrackHeader').style.height=trackH+'px';
  
  SUBS.forEach((sub,gi)=>{
    if(!sub.text&&curSubIdx!==gi)return;
    const x=sub.start*pxPerSec;
    const w=Math.max((sub.end-sub.start)*pxPerSec,20);
    const row=subRows[gi]||0;
    const color=subColors[gi%subColors.length];
    const d=document.createElement('div');d.className='tl-sub-clip';
    d.style.left=x+'px';d.style.width=w+'px';
    d.style.top=(row*ROW_H+1)+'px';d.style.height=(ROW_H-2)+'px';
    d.style.borderColor=color;d.style.background=color+'22';
    d.innerHTML=`<span class="sub-trim left" style="background:${color}"></span><span style="pointer-events:none;overflow:hidden;text-overflow:ellipsis;color:${color};font-size:10px">${sub.text||'(빈 자막)'}</span><span class="sub-trim right" style="background:${color}"></span>`;
    if(selectedSub===gi||curSubIdx===gi)d.classList.add('sel');
    d.addEventListener('mousedown',(e)=>{e.stopPropagation()});
    d.addEventListener('click',(e)=>{
      if(e.target.classList.contains('sub-trim'))return;
      e.stopPropagation();
      curSubIdx=gi;selectedSub=gi;
      syncSubStylePanel();applySubStyle();renderTL();
    });
    initGlobalSubDrag(d,gi);
    initGlobalSubTrim(d.querySelector('.sub-trim.left'),gi,'left');
    initGlobalSubTrim(d.querySelector('.sub-trim.right'),gi,'right');
    st.appendChild(d);
  });

  // Audio track (visual)
  const at=document.getElementById('audioTrack');at.innerHTML='';
  CLIPS.forEach((c,i)=>{
    const dur=clipDur(i);
    const x=starts[i]*pxPerSec;const w=Math.max(dur*pxPerSec,6);
    const d=document.createElement('div');d.className=`tl-audio-clip s${c.source_idx%6}`;
    d.style.left=x+'px';d.style.width=w+'px';
    at.appendChild(d);
  });

  // Format guide line + overflow shading
  document.getElementById('trackArea').querySelectorAll('.fmt-guide,.fmt-overflow').forEach(e=>e.remove());
  if(activeFormat>0){
    const guideX=HDR+activeFormat*pxPerSec;
    const guide=document.createElement('div');
    guide.className='fmt-guide';guide.style.left=guideX+'px';
    guide.innerHTML=`<span class="fmt-guide-label">${activeFormat}s</span>`;
    document.getElementById('trackArea').appendChild(guide);
    
    // Overflow shading
    if(total>activeFormat){
      const ov=document.createElement('div');
      ov.className='fmt-overflow';
      ov.style.left=guideX+'px';
      ov.style.right='0';
      document.getElementById('trackArea').appendChild(ov);
    }
    
    // Dim clips that exceed format duration
    CLIPS.forEach((c,i)=>{
      const clipEnd=starts[i]+clipDur(i);
      const el=document.getElementById('tc-'+i);
      if(el&&clipEnd>activeFormat)el.classList.add('overflow');
    });
  }

  initTrimHandles();
  updatePlayhead();
}

/* ─── Trim ─── */
function initTrimHandles(){
  document.querySelectorAll('.tl-trim').forEach(el=>{
    el.addEventListener('mousedown',e=>{
      e.stopPropagation();
      const i=parseInt(el.dataset.i),side=el.dataset.side;
      sel(i);save();
      const orig={s:CLIPS[i].start,e:CLIPS[i].end};
      const startX=e.clientX;
      const onMove=ev=>{
        const dt=(ev.clientX-startX)/pxPerSec*(clipMeta[i]?.speed||1);
        if(side==='left'){
          CLIPS[i].start=Math.max(0,Math.round((orig.s+dt)*10)/10);
          if(CLIPS[i].start>=CLIPS[i].end-0.2)CLIPS[i].start=CLIPS[i].end-0.2;
        } else {
          CLIPS[i].end=Math.round((orig.e+dt)*10)/10;
          if(CLIPS[i].end<=CLIPS[i].start+0.2)CLIPS[i].end=CLIPS[i].start+0.2;
        }
        recalc();renderTL();updateDetail();
      };
      const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp)};
      document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
    });
  });
}

/* ─── Blade ─── */
function showBladeLine(e,i){
  const el=document.getElementById('tc-'+i);
  if(!el)return;
  const scroll=document.getElementById('tlScroll');
  const scrollRect=scroll.getBoundingClientRect();
  const bl=document.getElementById('bladeLine');
  const x=e.clientX-scrollRect.left+scroll.scrollLeft;
  bl.style.display='block';
  bl.style.left=x+'px';
  bl.style.top='0';
  bl.style.height='100%';
}

function bladeCut(e,i){
  const el=document.getElementById('tc-'+i);
  if(!el)return;
  const rect=el.getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width;
  const c=CLIPS[i];
  const cutPoint=c.start+pct*(c.end-c.start);
  if(cutPoint<=c.start+0.2||cutPoint>=c.end-0.2)return;

  save();
  const newClip={...c,start:cutPoint,source_idx:c.source_idx};
  const origEnd=c.end;
  CLIPS[i].end=cutPoint;
  CLIPS.splice(i+1,0,{...newClip,end:origEnd});
  // Global subs: no clip-based splice needed (subtitles span clips independently)
  clipMeta.splice(i+1,0,{...clipMeta[i]});
  clipSubStyles.splice(i+1,0,{...clipSubStyles[i]});
  clipCrops.splice(i+1,0,{...clipCrops[i]});
  clipZooms.splice(i+1,0,{...clipZooms[i]});
  // Split subTiming at cut point
  if(subTiming[i]){
    const st=subTiming[i];
    const splitT=starts[i]+((cutPoint-CLIPS[i].start)/(clipMeta[i]?.speed||1));
    subTiming.splice(i+1,0,{start:splitT,end:st.end,_manual:st._manual});
    st.end=splitT;
  }
  recalc();renderTL();sel(i);
  document.getElementById('bladeLine').style.display='none';
}

/* ─── Clip Drag Reorder ─── */
function startClipDrag(e,i){
  const startX=e.clientX;let moved=false;let dropTarget=-1;
  const el=document.getElementById('tc-'+i);
  const indicator=document.getElementById('dropIndicator');
  
  const onMove=ev=>{
    if(Math.abs(ev.clientX-startX)>8&&!moved){
      moved=true;
      if(el)el.classList.add('dragging');
    }
    if(!moved)return;
    
    // Calculate drop target
    const dt=(ev.clientX-startX)/pxPerSec;
    const newPos=starts[i]+dt;
    let t=0;
    for(let j=0;j<CLIPS.length;j++){if(newPos>starts[j]+clipDur(j)/2)t=j+1}
    if(t>i)t--;
    t=Math.max(0,Math.min(CLIPS.length-1,t));
    dropTarget=t;
    
    // Show drop indicator
    if(t!==i){
      const insertIdx=t>=i?t+1:t;
      let indicatorX;
      if(insertIdx>=CLIPS.length){
        indicatorX=HDR+(starts[CLIPS.length-1]+clipDur(CLIPS.length-1))*pxPerSec;
      } else {
        indicatorX=HDR+starts[insertIdx]*pxPerSec;
      }
      indicator.style.display='block';
      indicator.style.left=(indicatorX-1)+'px';
      indicator.style.top='0';
      indicator.style.height='100%';
    } else {
      indicator.style.display='none';
    }
  };
  
  const onUp=ev=>{
    document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);
    if(el)el.classList.remove('dragging');
    indicator.style.display='none';
    if(!moved)return;
    
    if(dropTarget>=0&&dropTarget!==i){save();
      const cl=CLIPS.splice(i,1)[0],me=clipMeta.splice(i,1)[0],sst=clipSubStyles.splice(i,1)[0],scr=clipCrops.splice(i,1)[0],szm=clipZooms.splice(i,1)[0];
      CLIPS.splice(dropTarget,0,cl);clipMeta.splice(dropTarget,0,me);clipSubStyles.splice(dropTarget,0,sst);clipCrops.splice(dropTarget,0,scr);clipZooms.splice(dropTarget,0,szm);
      recalc();renderTL();sel(dropTarget);
    }
  };
  document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
}

/* ─── Visual Trim Bar ─── */
let _trimSrcDuration=0;
let _trimDragging=null; // 'start'|'end'|'range'|'seek'|null

function updateTrimBar(){
  const c=CLIPS[cur];
  if(!c)return;
  const bar=document.getElementById('trimBar');
  const range=document.getElementById('trimRange');
  const phead=document.getElementById('trimPlayhead');
  const durLabel=document.getElementById('trimSrcDur');
  
  // Get source video duration
  const vid=document.getElementById('vid');
  _trimSrcDuration=vid.duration||c.end+5;
  
  const pct=x=>((x/_trimSrcDuration)*100).toFixed(2)+'%';
  range.style.left=pct(c.start);
  range.style.width=pct(c.end-c.start);
  
  // Playhead
  const ct=vid.currentTime||c.start;
  phead.style.left=pct(ct);
  
  durLabel.textContent=formatTrimTime(_trimSrcDuration);
}

function formatTrimTime(s){
  const m=Math.floor(s/60);
  const sec=Math.floor(s%60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

(function initTrimBar(){
  const bar=document.getElementById('trimBar');
  if(!bar)return;
  
  function getTimeFromX(e){
    const rect=bar.getBoundingClientRect();
    const x=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
    return x*_trimSrcDuration;
  }
  
  function hitTest(e){
    const rect=bar.getBoundingClientRect();
    const x=(e.clientX-rect.left)/rect.width;
    const c=CLIPS[cur];
    if(!c||!_trimSrcDuration)return'seek';
    const startPct=c.start/_trimSrcDuration;
    const endPct=c.end/_trimSrcDuration;
    const threshold=8/rect.width; // 8px handle zone
    if(Math.abs(x-startPct)<threshold)return'start';
    if(Math.abs(x-endPct)<threshold)return'end';
    if(x>startPct&&x<endPct)return'range';
    return'seek';
  }
  
  let dragOrigin=null;
  
  bar.addEventListener('mousedown',e=>{
    e.preventDefault();
    const type=hitTest(e);
    _trimDragging=type;
    const c=CLIPS[cur];
    if(!c)return;
    
    if(type==='seek'){
      // Click outside range: move playhead
      const t=getTimeFromX(e);
      document.getElementById('vid').currentTime=t;
      updateTrimBar();
      _trimDragging=null;
      return;
    }
    
    save();
    dragOrigin={start:c.start,end:c.end,mouseT:getTimeFromX(e)};
    
    const onMove=ev=>{
      const t=getTimeFromX(ev);
      const dt=t-dragOrigin.mouseT;
      
      if(_trimDragging==='start'){
        c.start=Math.max(0,Math.round((dragOrigin.start+dt)*10)/10);
        if(c.start>=c.end-0.3)c.start=c.end-0.3;
        document.getElementById('vid').currentTime=c.start;
      }else if(_trimDragging==='end'){
        c.end=Math.round((dragOrigin.end+dt)*10)/10;
        if(c.end<=c.start+0.3)c.end=c.start+0.3;
        if(c.end>_trimSrcDuration)c.end=Math.round(_trimSrcDuration*10)/10;
        document.getElementById('vid').currentTime=c.end-0.5;
      }else if(_trimDragging==='range'){
        const dur=dragOrigin.end-dragOrigin.start;
        let newStart=Math.round((dragOrigin.start+dt)*10)/10;
        if(newStart<0)newStart=0;
        if(newStart+dur>_trimSrcDuration)newStart=Math.round((_trimSrcDuration-dur)*10)/10;
        c.start=newStart;
        c.end=Math.round((newStart+dur)*10)/10;
        document.getElementById('vid').currentTime=c.start;
      }
      
      document.getElementById('dStart').value=c.start.toFixed(1);
      document.getElementById('dEnd').value=c.end.toFixed(1);
      recalc();renderTL();updateTrimBar();updateDetail();
    };
    
    const onUp=()=>{
      _trimDragging=null;
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
    };
    
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });
  
  // Cursor style
  bar.addEventListener('mousemove',e=>{
    if(_trimDragging)return;
    const type=hitTest(e);
    bar.style.cursor=type==='start'||type==='end'?'ew-resize':type==='range'?'grab':'crosshair';
  });
})();

// Update trim bar when video time updates
(function(){

    vid.addEventListener('loadedmetadata',()=>updateTrimBar());
    vid.addEventListener('timeupdate',()=>{

function getSubSpanInfo(sub){

function delCur(){if(CLIPS.length<=1)return;save();CLIPS.splice(cur,1);clipMeta.splice(cur,1);clipSubStyles.splice(cur,1);clipCrops.splice(cur,1);clipZooms.splice(cur,1);recalc();renderTL();sel(Math.min(cur,CLIPS.length-1))}

/* ─── Playback / JKL ─── */
function togglePlay(){playing?stopP():startP()}
function startP(){
  playing=true;document.getElementById('playBtn').textContent='⏸';document.getElementById('playBtn').classList.add('playing');playSpeed=1;updateSpeedBadge();
  
  // Find clip and offset from gTime
  let startIdx=0,offset=0;
  for(let i=0;i<CLIPS.length;i++){
    const end=starts[i]+clipDur(i);
    if(gTime<end-0.01){startIdx=i;offset=gTime-starts[i];break}
    if(i===CLIPS.length-1){startIdx=i;offset=clipDur(i)}
  }
  playC(startIdx,offset);
}
function stopP(){
  playing=false;playSpeed=1;updateSpeedBadge();
  ++_playGen; // invalidate any in-flight playC
  const vid=document.getElementById('vid');
  if(_onTU){vid.removeEventListener('timeupdate',_onTU);_onTU=null}
  vid.pause();
  document.getElementById('playBtn').textContent='▶';document.getElementById('playBtn').classList.remove('playing');
}

function jkl(key){
  const vid=document.getElementById('vid');
  if(key==='k'){stopP();return}
  if(key==='j'){playSpeed=Math.max(-4,playing?playSpeed<=-.5?playSpeed*2:-1:-1)}
  if(key==='l'){playSpeed=Math.min(4,playing?playSpeed>=.5?playSpeed*2:1:1)}
  updateSpeedBadge();
  if(!playing)startP();
  vid.playbackRate=Math.abs(playSpeed);
  // Reverse not natively supported, just skip frames
  if(playSpeed<0){vid.pause();reverseStep()}
}
function updateSpeedBadge(){
  const b=document.getElementById('speedBadge');
  if(playSpeed!==1&&playing){b.textContent=playSpeed+'x';b.classList.add('show')}
  else b.classList.remove('show');
}
function reverseStep(){
  if(!playing||playSpeed>=0)return;
  const vid=document.getElementById('vid');
  vid.currentTime=Math.max(0,vid.currentTime-0.1);
  requestAnimationFrame(reverseStep);
}

function seekStart(){gTime=0;seekToGlobal(0)}
function seekEnd(){gTime=total;seekToGlobal(total)}
function seekToGlobal(t){
  gTime=Math.max(0,Math.min(total,t));
  const vid=document.getElementById('vid');
  vid.onloadedmetadata=null; // Clear any pending loadedmetadata from sel()
  for(let i=0;i<CLIPS.length;i++){
    const end=starts[i]+clipDur(i);
    if(gTime<=end+0.01){
      selUI(i);
      const c=CLIPS[i];
      const src=VBASE+'/'+c.source.split('/').pop();
      const targetTime=c.start+(gTime-starts[i])*(clipMeta[i]?.speed||1);
      if(vid.dataset.src!==src){
        vid.src=src;vid.dataset.src=src;
        vid.onloadedmetadata=()=>{srcDurs[src]=vid.duration;vid.currentTime=targetTime};
      } else {
        vid.currentTime=targetTime;
      }
      break;
    }
  }
  updatePlayhead();updateTC();showSubAtTime(gTime);
}

function playC(i,offsetSec){
  if(i>=CLIPS.length){stopP();return}
  const vid=document.getElementById('vid');
  // Clean up previous listener
  if(_onTU){vid.removeEventListener('timeupdate',_onTU);_onTU=null}
  vid.onloadeddata=null;
  vid.pause();

  const gen=++_playGen; // generation to discard stale events

  const c=CLIPS[i];
  const spd=clipMeta[i]?.speed||1;
  const src=VBASE+'/'+c.source.split('/').pop();
  const srcOffset=(offsetSec||0)*spd;
  const startTime=Math.min(c.start+srcOffset,c.end-0.1);

  // Update UI only
  cur=i;
  document.querySelectorAll('.tl-clip').forEach((e,j)=>e.classList.toggle('active',j===i));
  updateDetail();
  showSubAtTime(gTime);
  applyZoomToVideo();applyCropToVideo();checkLetterbox();

  const startPlayback=()=>{
    if(gen!==_playGen)return; // stale
    vid.playbackRate=spd;
    vid.currentTime=startTime;
    const onSeeked=()=>{
      vid.removeEventListener('seeked',onSeeked);
      if(gen!==_playGen)return;
      if(playing)vid.play();
    };
    vid.addEventListener('seeked',onSeeked);
  };

  if(vid.dataset.src!==src){
    vid.src=src;vid.dataset.src=src;
    vid.onloadeddata=()=>{
      vid.onloadeddata=null;
      if(gen!==_playGen)return;
      srcDurs[src]=vid.duration;
      startPlayback();
    };
  } else {
    startPlayback();
  }

  _onTU=function(){
    if(gen!==_playGen||!playing)return;
    // Guard: ignore timeupdate if video is outside expected clip range (stale seek)
    if(vid.currentTime<c.start-0.5||vid.currentTime>c.end+0.5)return;
    if(vid.currentTime>=c.end-0.05){
      vid.removeEventListener('timeupdate',_onTU);_onTU=null;
      vid.pause();
      if(gen!==_playGen)return;
      playC(i+1,0);
      return;
    }
    gTime=starts[i]+(vid.currentTime-c.start)/spd;
    updatePlayhead();updateTC();showSubAtTime(gTime);
  };
  vid.addEventListener('timeupdate',_onTU);
}

function markOut(){markOutT=gTime;const b=document.getElementById('markOutBadge');b.style.display='block';b.textContent='OUT '+fmt(gTime)}
function insertFromMark(){
  if(markInT===null||markOutT===null||markOutT<=markInT)return;
  // Find source clip at mark-in
  for(let i=0;i<CLIPS.length;i++){
    const end=starts[i]+clipDur(i);
    if(markInT<=end){
      const c=CLIPS[i];
      const sOff=(markInT-starts[i])*(clipMeta[i]?.speed||1);
      const eOff=(Math.min(markOutT,end)-starts[i])*(clipMeta[i]?.speed||1);
      save();
      CLIPS.push({source:c.source,source_idx:c.source_idx,start:c.start+sOff,end:c.start+eOff,score:0});
      clipMeta.push({speed:1,transition:'none',transDur:0.3});
      recalc();renderTL();sel(CLIPS.length-1);
      return;
    }
  }
}

function exportJson(){copy(JSON.stringify({clips:CLIPS.map((c,i)=>({...c,subtitles:getClipSubs(i),subStyle:clipSubStyles[i],crop:clipCrops[i],zoom:clipZooms[i],speed:clipMeta[i].speed,transition:clipMeta[i].transition}))},null,2),'JSON 복사됨!')}
function getMaxSourceFps(){
  const fpsVals=Object.values(srcFps);
  return fpsVals.length?Math.max(...fpsVals):30;
}

function renderVideo(){
  const maxDur=activeFormat||0;
  
  // Build clip list, trimming to maxDur if set
  let renderClips=[];
  let accumulated=0;
  for(let i=0;i<CLIPS.length;i++){
    const c=CLIPS[i];
    const spd=clipMeta[i]?.speed||1;
    const dur=clipDur(i);
    
    if(maxDur>0&&accumulated>=maxDur)break;
    
    let clipData={
      ...c,subtitles:getClipSubs(i),subStyle:clipSubStyles[i],
      crop:clipCrops[i],zoom:clipZooms[i],
      speed:spd,transition:clipMeta[i].transition
    };
    
    if(maxDur>0&&accumulated+dur>maxDur){
      const remain=maxDur-accumulated;
      clipData.end=clipData.start+remain*spd;
    }
    
    renderClips.push(clipData);
    accumulated+=(clipData.end-clipData.start)/(clipData.speed||1);
  }

  const maxFps=getMaxSourceFps();
  const defaultFps=maxFps>30?60:30;
  const label=maxDur>0?`${maxDur}초 (${renderClips.length}클립)`:`전체 ${accumulated.toFixed(1)}초 (${renderClips.length}클립)`;
  
  showRenderConfirm(label,defaultFps,renderClips,maxDur);
}

function pollRender(totalClips){
  const poll=()=>{
    fetch(apiUrl('/api/render/status')).then(r=>r.json()).then(s=>{
      const elapsed=((Date.now()-_renderStartTime)/1000).toFixed(0);
      if(s.state==='rendering'){
        const pct=s.total>0?Math.round(s.progress/s.total*100):0;
        document.getElementById('renderBar').style.width=pct+'%';
        document.getElementById('renderStatusText').textContent=`클립 처리 중... ${s.progress}/${s.total}`;

        renderSuccess(elapsed);

        renderError(s.error);
      } else {
        setTimeout(poll,1000);

function exportCmd(){
  // Generate a full ffmpeg render script
  const outName='edited_output.mp4';
  const W=1080,H=1920; // 9:16 vertical
  let lines=['#!/bin/bash','set -e','# Auto-generated render script',''];

  // Step 1: Process each clip
  const tmpFiles=[];
  CLIPS.forEach((c,i)=>{
    const src=c.source;
    const spd=clipMeta[i]?.speed||1;
    const cr=cropOf(i);
    const zm=zoomOf(i);
    const tmp=`_clip_${String(i).padStart(3,'0')}.mp4`;
    tmpFiles.push(tmp);

    // Build filter chain
    let filters=[];

    // Trim
    const dur=((c.end-c.start)/spd);

    // Speed
    if(spd!==1){
      filters.push(`setpts=${(1/spd).toFixed(4)}*PTS`);
    }

    // Scale to output size first
    filters.push(`scale=${W}:${H}:force_original_aspect_ratio=increase`);
    filters.push(`crop=${W}:${H}`);

    // Zoom (scale + translate)
    if(zm.scale!==1||zm.panX!==0||zm.panY!==0){
      const zw=Math.round(W*zm.scale);
      const zh=Math.round(H*zm.scale);
      const zx=Math.round((zw-W)/2 - (zm.panX/100)*W);
      const zy=Math.round((zh-H)/2 - (zm.panY/100)*H);
      filters.push(`scale=${zw}:${zh}`);
      filters.push(`crop=${W}:${H}:${Math.max(0,zx)}:${Math.max(0,zy)}`);
    }

    // Crop (mask — draw black outside region)
    if(cr.x!==0||cr.y!==0||cr.w!==100||cr.h!==100){
      const cx=Math.round(cr.x/100*W);
      const cy=Math.round(cr.y/100*H);
      const cw=Math.round(cr.w/100*W);
      const ch=Math.round(cr.h/100*H);
      // Overlay crop region on black background
      filters.push(`split[orig][bg]`);
      filters.push(`[bg]drawbox=x=0:y=0:w=${W}:h=${H}:c=black:t=fill[black]`);
      filters.push(`[orig]crop=${cw}:${ch}:${cx}:${cy}[cropped]`);
      // Use complex filter for this clip
      const vf=filters.slice(0,-3).join(',');
      const pre=vf?`-vf "${vf}"`:'';
      lines.push(`# Clip ${i+1}: ${src} [${c.start.toFixed(2)}~${c.end.toFixed(2)}] crop`);
      lines.push(`ffmpeg -y -ss ${c.start.toFixed(3)} -t ${(c.end-c.start).toFixed(3)} -i "${src}" \\`);
      lines.push(`  -filter_complex "${vf?vf+',':''}split[orig][bg];[bg]drawbox=x=0:y=0:w=${W}:h=${H}:c=black:t=fill[black];[orig]crop=${cw}:${ch}:${cx}:${cy}[cropped];[black][cropped]overlay=${cx}:${cy}" \\`);
      lines.push(`  -c:v libx264 -preset fast -crf 18 -an -t ${dur.toFixed(3)} "${tmp}"`);
      lines.push('');
      return;
    }

    const vf=filters.join(',');
    lines.push(`# Clip ${i+1}: ${src} [${c.start.toFixed(2)}~${c.end.toFixed(2)}]${spd!==1?' speed:'+spd+'x':''}`);
    lines.push(`ffmpeg -y -ss ${c.start.toFixed(3)} -t ${(c.end-c.start).toFixed(3)} -i "${src}" \\`);
    lines.push(`  -vf "${vf}" \\`);
    lines.push(`  -c:v libx264 -preset fast -crf 18 -an -t ${dur.toFixed(3)} "${tmp}"`);
    lines.push('');
  });

  // Step 2: Concat list
  lines.push('# Concat all clips');
  lines.push(`cat > _concat.txt << 'EOF'`);
  tmpFiles.forEach(f=>lines.push(`file '${f}'`));
  lines.push('EOF');
  lines.push('');

  // Step 3: Concat
  lines.push(`ffmpeg -y -f concat -safe 0 -i _concat.txt -c copy _merged.mp4`);
  lines.push('');

  // Step 4: Generate SRT and burn subtitles
  let srt='',n=1;
  let hasSubs=false;
  SUBS.forEach(sub=>{
    if(!sub.text)return;
    hasSubs=true;
    srt+=`${n}\n${srtT(sub.start)} --> ${srtT(sub.end)}\n${sub.text}\n\n`;
    n++;
  });

  if(hasSubs){
    lines.push('# Generate SRT');
    lines.push(`cat > _subs.srt << 'SRTEOF'`);
    lines.push(srt.trim());
    lines.push('SRTEOF');
    lines.push('');

    // Get representative subtitle style (first clip with subtitle)
    const subIdx=SUBS.findIndex(s=>s);
    const ss=subIdx>=0?(clipSubStyles[subIdx]||{size:16,x:50,y:80}):{size:16,x:50,y:80};
    const fontSize=Math.round(ss.size*3); // scale up for 1080 render
    const mx=Math.round((ss.x/100)*W);
    const my=Math.round((ss.y/100)*H);

    lines.push('# Burn subtitles');
    lines.push(`ffmpeg -y -i _merged.mp4 \\`);
    lines.push(`  -vf "subtitles=_subs.srt:force_style='FontSize=${fontSize},Alignment=2,MarginV=${H-my},Bold=1'" \\`);
    lines.push(`  -c:v libx264 -preset fast -crf 18 "${outName}"`);
  } else {
    lines.push(`mv _merged.mp4 "${outName}"`);
  }

  lines.push('');
  lines.push('# Cleanup');
  lines.push(`rm -f ${tmpFiles.join(' ')} _concat.txt _merged.mp4 _subs.srt`);
  lines.push('');
  lines.push(`echo "✅ Done: ${outName}"`);

  const script=lines.join('\n');

  // Also save to file
  const blob=new Blob([script],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='render.sh';
  a.click();
  URL.revokeObjectURL(a.href);

  copy(script,'렌더 스크립트 복사 + render.sh 다운로드됨!');
}
function srtT(s){const h=Math.floor(s/3600),m=Math.floor(s%3600/60),sec=Math.floor(s%60),ms=Math.round(s%1*1000);return p(h)+':'+p(m)+':'+p(sec)+','+String(ms).padStart(3,'0')}
function p(n){return String(n).padStart(2,'0')}
function copy(t,msg){navigator.clipboard.writeText(t).then(()=>alert(msg)).catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert(msg)})}

/* ─── Playhead drag + track click to seek ─── */
(function(){
  const ph=document.getElementById('tlPlayhead');
  const scroll=document.getElementById('tlScroll');

  function timeFromX(clientX){
    const rect=scroll.getBoundingClientRect();
    const x=clientX-rect.left+scroll.scrollLeft-HDR;
    return Math.max(0,Math.min(total,x/pxPerSec));
  }

  function scrubTo(t){
    if(playing)stopP();
    gTime=Math.max(0,Math.min(total,t));
    updatePlayhead();updateTC();
    // Find clip and show frame
    for(let i=0;i<CLIPS.length;i++){
      const end=starts[i]+clipDur(i);
      if(gTime<=end+0.01){
        const vid=document.getElementById('vid');
        const src=VBASE+'/'+CLIPS[i].source.split('/').pop();
        if(vid.dataset.src!==src){vid.src=src;vid.dataset.src=src}
        vid.currentTime=CLIPS[i].start+(gTime-starts[i])*(clipMeta[i]?.speed||1);
        showSubAtTime(gTime);
        // highlight
        if(cur!==i){cur=i;document.querySelectorAll('.tl-clip').forEach((e,j)=>e.classList.toggle('active',j===i));updateDetail();applyZoomToVideo();applyCropToVideo();checkLetterbox()}
        break;
      }
    }
  }

  // Drag playhead
  ph.addEventListener('mousedown',e=>{
    e.preventDefault();e.stopPropagation();
    const onMove=ev=>{scrubTo(timeFromX(ev.clientX))};
    const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp)};
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
  });

  // Click on track area to seek (but not on clips)
  scroll.addEventListener('mousedown',e=>{
    // Skip if clicking on clip, trim handle, playhead, etc.
    if(e.target.closest('.tl-clip')||e.target.closest('.tl-sub-clip')||e.target.closest('.tl-playhead'))return;
    e.preventDefault();
    scrubTo(timeFromX(e.clientX));
    const onMove=ev=>{scrubTo(timeFromX(ev.clientX))};
    const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp)};
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
  });
})();

/* ─── Keyboard ─── */
document.addEventListener('keydown',e=>{
  const k=e.code;
  if(e.target.tagName==='SELECT')return;
  if(e.target.tagName==='INPUT'&&e.target.type==='range'){e.target.blur();}
  else if(e.target.tagName==='INPUT')return;
  if(k==='Space'){e.preventDefault();togglePlay()}
  if(k==='ArrowLeft'){e.preventDefault();seekToGlobal(gTime-1)}
  if(k==='ArrowRight'){e.preventDefault();seekToGlobal(gTime+1)}
  if(k==='ArrowUp'){e.preventDefault();sel(Math.max(0,cur-1))}
  if(k==='ArrowDown'){e.preventDefault();sel(Math.min(CLIPS.length-1,cur+1))}
  if(k==='KeyV')setTool('select');
  if(k==='KeyC'&&!e.metaKey&&!e.ctrlKey)setTool('blade');
  if(k==='KeyP')setTool('crop');

  if(k==='KeyJ')jkl('j');
  if(k==='KeyK')jkl('k');
  if(k==='KeyL')jkl('l');
  if(k==='Home'){e.preventDefault();seekStart()}
  if(k==='End'){e.preventDefault();seekEnd()}
  if((k==='Delete'||k==='Backspace')){
    e.preventDefault();
    if(selectedSub>=0){deleteSelectedSub();return}
    if(cur>=0&&cur<CLIPS.length&&CLIPS.length>1){delCur()}
  }
  if(k==='KeyZ'&&(e.metaKey||e.ctrlKey)){e.preventDefault();undo()}
  if(k==='KeyZ'&&e.shiftKey){e.preventDefault();zoomFit()}
  if(k==='Minus'||k==='NumpadSubtract'){e.preventDefault();zoomOut()}
  if(k==='Equal'||k==='NumpadAdd'){e.preventDefault();zoomIn()}
});

let currentProjectId=null;
let currentProjectName='';

/* ─── Project list ─── */
function showTab(){loadProjectList()}

/* ─── Project CRUD ─── */
function loadProjectList(){
  const list=document.getElementById('projectList');
  list.innerHTML='<div class="src-loading">불러오는 중...</div>';
  fetch(apiUrl('/api/projects')).then(r=>r.json()).then(data=>{
    if(!data.projects||!data.projects.length){
      list.innerHTML='<div class="src-loading" style="color:#555">저장된 프로젝트가 없습니다.<br><br>➕ 새 프로젝트 탭에서 시작하세요</div>';
      return;
    }
    list.innerHTML='';
    data.projects.forEach(p=>{
      const item=document.createElement('div');
      item.className='proj-item';
      const date=new Date(p.updatedAt*1000);
      const dateStr=`${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2,'0')}`;
      const srcs=(p.sources||[]).slice(0,3).join(', ');
      item.innerHTML=`
        <div style="font-size:18px">🎬</div>
        <div class="proj-info">
          <div class="proj-name" ondblclick="event.stopPropagation();renameProject('${p.id}',this)">${p.name||p.id}</div>
          <div class="proj-meta">${p.clipCount}클립 · ${p.totalDuration}초 · ${dateStr}</div>
          ${srcs?`<div class="proj-meta">${srcs}</div>`:''}
        </div>
        <span class="proj-del" onclick="event.stopPropagation();renameProject('${p.id}',this.parentElement.querySelector('.proj-name'))" title="이름 수정">✏️</span>
        <span class="proj-del" onclick="event.stopPropagation();deleteProject('${p.id}')" title="삭제">🗑</span>
      `;
      item.addEventListener('click',()=>loadProject(p.id));
      list.appendChild(item);
    });
  });
}

function loadProject(pid){
  fetch(apiUrl('/api/projects/load/'+encodeURIComponent(pid))).then(r=>r.json()).then(data=>{
    currentProjectId=data.id;
    currentProjectName=data.name||'';
    CLIPS=data.clips||[];
    SUBS=data.subs||[];
    // normSubs needs starts[] so defer until after recalc
    // Restore per-clip metadata
    clipMeta=(data.clipMeta||[]).length===CLIPS.length?data.clipMeta:CLIPS.map(()=>({speed:1,transition:'none',transDur:0.3}));
    clipSubStyles=(data.clipSubStyles||[]).length===CLIPS.length?data.clipSubStyles:CLIPS.map(()=>({...subStyleDefault}));
    clipCrops=(data.clipCrops||[]).length===CLIPS.length?data.clipCrops:CLIPS.map(()=>({x:0,y:0,w:100,h:100}));
    clipZooms=(data.clipZooms||[]).length===CLIPS.length?data.clipZooms:CLIPS.map(()=>({scale:1,panX:0,panY:0}));
    subTiming=(data.subTiming||[]).length===CLIPS.length?data.subTiming:[];
    hist=[];cur=0;
    recalc();normSubs();renderTL();
    if(CLIPS.length)sel(0);
    applySubStyle();refreshPresetList();
    document.getElementById('srcOverlay').classList.add('hidden');
    document.title=currentProjectName?`${currentProjectName} — Editor`:'Timeline Editor';
  });
}

function saveProject(){
  if(!CLIPS.length){alert('편집 데이터가 없습니다');return}
  if(!currentProjectName){
    const name=prompt('프로젝트 이름:');
    if(!name)return;
    currentProjectName=name;
  }
  if(!currentProjectId)currentProjectId='proj_'+Date.now();
  
  const sources=[...new Set(CLIPS.map(c=>c.source))];
  const payload={
    id:currentProjectId,
    name:currentProjectName,
    clips:CLIPS,
    subs:SUBS,
    clipMeta,
    clipSubStyles,
    clipCrops,
    clipZooms,
    subTiming:subTiming.map(t=>({start:t.start,end:t.end,_manual:!!t._manual})),
    sources,
    totalDuration:total
  };
  
  fetch(apiUrl('/api/projects/save'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
    .then(r=>r.json()).then(r=>{
      if(r.id)currentProjectId=r.id;
      document.title=`${currentProjectName} — Editor`;
      // Brief visual feedback
      const btn=document.querySelector('[onclick="saveProject()"]');
      btn.textContent='✅ 저장됨';
      setTimeout(()=>{btn.textContent='💾 저장'},1500);
    });
}

function renameProject(pid, el){
  const old=el.textContent;
  const input=document.createElement('input');
  input.type='text';input.value=old;
  input.style.cssText='background:#111;border:1px solid #2563eb;color:#fff;font-size:12px;font-weight:600;padding:2px 6px;border-radius:4px;width:100%';
  el.replaceWith(input);input.focus();input.select();
  const save=()=>{
    const newName=input.value.trim()||old;
    const span=document.createElement('div');
    span.className='proj-name';span.textContent=newName;
    span.setAttribute('ondblclick',`event.stopPropagation();renameProject('${pid}',this)`);
    input.replaceWith(span);
    if(newName!==old){
      fetch(apiUrl('/api/projects/rename'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:pid,name:newName})});
      if(currentProjectId===pid)currentProjectName=newName;
    }
  };
  input.addEventListener('blur',save);
  input.addEventListener('keydown',e=>{if(e.key==='Enter')input.blur();if(e.key==='Escape'){input.value=old;input.blur()}});
}

function deleteProject(pid){
  if(!confirm('이 프로젝트를 삭제할까요?'))return;
  fetch(apiUrl('/api/projects/delete'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:pid})})
    .then(()=>loadProjectList());
}

/* ─── Source Selector ─── */
function loadVideoList(){
  fetch(apiUrl('/api/list-videos')).then(r=>r.json()).then(data=>{
    const list=document.getElementById('srcList');
    if(!data.videos||!data.videos.length){
      list.innerHTML='<div class="src-loading">영상 파일이 없습니다. 폴더에 영상을 넣어주세요.</div>';
      return;
    }
    list.innerHTML='';
    data.videos.forEach((v,i)=>{
      if(v.fps)srcFps[v.name]=v.fps;
      const item=document.createElement('div');
      item.className='src-item selected';
      item.draggable=true;
      item.dataset.name=v.name;
      item.innerHTML=`
        <img class="src-thumb" src="${apiUrl('/api/thumbnail/'+encodeURIComponent(v.name))}" alt="" onerror="this.style.display='none'">
        <input type="checkbox" class="src-check" checked>
        <span class="src-idx">${i+1}</span>
        <span class="src-name">🎥 ${v.name}</span>
        <span class="src-meta">${v.duration}s · ${v.size}MB · ${v.fps||30}fps</span>
        <span class="src-drag">⠿</span>
        <span class="proj-del" title="목록에서 제거" onclick="event.stopPropagation();this.closest('.src-item').remove();reindexSrcList()">✕</span>
      `;
      // Toggle selection
      item.querySelector('.src-check').addEventListener('change',function(){
        item.classList.toggle('selected',this.checked);
      });
      // Drag reorder
      item.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',i);item.style.opacity='0.4'});
      item.addEventListener('dragend',()=>{item.style.opacity='1'});
      item.addEventListener('dragover',e=>{e.preventDefault();item.style.borderTopColor='#2563eb'});
      item.addEventListener('dragleave',()=>{item.style.borderTopColor=''});
      item.addEventListener('drop',e=>{
        e.preventDefault();item.style.borderTopColor='';
        const from=parseInt(e.dataTransfer.getData('text/plain'));
        const items=[...list.children];
        const target=items.indexOf(item);
        if(from!==target){
          const el=items[from];
          if(from<target)item.after(el);else item.before(el);
          reindexSrcList();
        }
      });
      list.appendChild(item);
    });
  }).catch(()=>{
    document.getElementById('srcList').innerHTML='<div class="src-loading">서버 연결 실패</div>';
  });
}

function handleFileDrop(e){
  e.preventDefault();e.currentTarget.style.borderColor='';
  const files=[...e.dataTransfer.files].filter(f=>f.type.startsWith('video/')||f.type.startsWith('image/'));
  if(files.length)uploadFiles(files);
}

function uploadFiles(fileList){
  if(!fileList.length)return;
  const fd=new FormData();
  for(const f of fileList)fd.append('files',f);
  
  const btn=document.querySelector('[onclick*="fileUpload"]');
  btn.disabled=true;btn.textContent='⏳ 업로드 중...';
  
  fetch(apiUrl('/api/upload'),{method:'POST',body:fd})
    .then(r=>r.json()).then(data=>{
      btn.disabled=false;btn.textContent='📁 영상 추가';
      if(data.uploaded&&data.uploaded.length){
        addVideosToList(data.uploaded);
      }
      document.getElementById('fileUpload').value='';
    }).catch(e=>{
      btn.disabled=false;btn.textContent='📁 영상 추가';
      alert('업로드 실패: '+e);
    });
}

function addVideosToList(videos){
  const list=document.getElementById('srcList');
  // Clear placeholder
  const placeholder=list.querySelector('.src-loading');
  if(placeholder)placeholder.remove();
  
  const existingNames=new Set([...list.querySelectorAll('.src-item')].map(el=>el.dataset.name));
  
  videos.forEach(v=>{
    if(existingNames.has(v.name))return; // skip duplicates
    const idx=list.querySelectorAll('.src-item').length;
    const item=document.createElement('div');
    item.className='src-item selected';
    item.draggable=true;
    item.dataset.name=v.name;
    item.innerHTML=`
      <img class="src-thumb" src="${apiUrl('/api/thumbnail/'+encodeURIComponent(v.name))}" alt="" onerror="this.style.display='none'">
      <input type="checkbox" class="src-check" checked>
      <span class="src-idx">${idx+1}</span>
      <span class="src-name">🎥 ${v.name}</span>
      <span class="src-meta">${v.duration}s · ${v.size}MB</span>
      <span class="src-drag">⠿</span>
      <span class="proj-del" title="목록에서 제거" onclick="event.stopPropagation();this.closest('.src-item').remove();reindexSrcList()">✕</span>
    `;
    item.querySelector('.src-check').addEventListener('change',function(){
      item.classList.toggle('selected',this.checked);
    });
    item.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',idx);item.style.opacity='0.4'});
    item.addEventListener('dragend',()=>{item.style.opacity='1'});
    item.addEventListener('dragover',e=>{e.preventDefault();item.style.borderTopColor='#2563eb'});
    item.addEventListener('dragleave',()=>{item.style.borderTopColor=''});
    item.addEventListener('drop',e=>{
      e.preventDefault();item.style.borderTopColor='';
      const from=parseInt(e.dataTransfer.getData('text/plain'));
      const items=[...list.children];
      const target=items.indexOf(item);
      if(from!==target){
        const el=items[from];
        if(from<target)item.after(el);else item.before(el);
        reindexSrcList();
      }
    });
    list.appendChild(item);
  });
  reindexSrcList();
}

function reindexSrcList(){
  document.querySelectorAll('.src-item .src-idx').forEach((el,i)=>el.textContent=i+1);
}

function getSelectedFiles(){
  const items=[...document.querySelectorAll('.src-item')];
  return items.filter(el=>el.querySelector('.src-check').checked).map(el=>el.dataset.name);
}

function startAnalyze(){
  const files=getSelectedFiles();
  if(!files.length){alert('영상을 선택해주세요');return}
  
  const subMode=document.getElementById('optAutoSub').value;
  const apiKey=document.getElementById('optApiKey').value.trim();
  // Save API key to localStorage
  if(apiKey)localStorage.setItem('tvcut_api_key',apiKey);
  const options={
    maxDuration:parseInt(document.getElementById('optMaxDur').value)||60,
    clipMin:parseFloat(document.getElementById('optClipMin').value)||1.5,
    clipMax:parseFloat(document.getElementById('optClipMax').value)||8,
    sceneThreshold:parseInt(document.getElementById('optScene').value)/100,
    subtitleMode:subMode,
    context:document.getElementById('subContext').value.trim(),
    apiKey:apiKey||localStorage.getItem('tvcut_api_key')||''
  };
  
  // Show analyze dialog
  showAnalyzeDialog(files.length);
  
  fetch(apiUrl('/api/analyze'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({files,options})})
    .then(r=>r.json()).then(()=>pollAnalyze())
    .catch(e=>{analyzeError('분석 요청 실패: '+e)});
}

let _analyzeStartTime=0;

function showAnalyzeDialog(fileCount){
  _analyzeStartTime=Date.now();
  const ov=document.getElementById('analyzeOverlay');
  ov.classList.add('show');
  document.getElementById('analyzeSpinner').style.display='inline-block';
  document.getElementById('analyzeDoneIcon').style.display='none';
  document.getElementById('analyzeTitle').textContent='영상 분석 중...';
  document.getElementById('analyzeBar').style.width='10%';
  document.getElementById('analyzeBar').style.background='#2563eb';
  document.getElementById('analyzeStatusText').textContent='준비 중...';
  document.getElementById('analyzeDetailText').textContent=`${fileCount}개 영상`;
  document.getElementById('analyzeDoneBtn').style.display='none';
}

function pollAnalyze(){
  const poll=()=>{
    fetch(apiUrl('/api/analyze/status')).then(r=>r.json()).then(s=>{
      const elapsed=((Date.now()-_analyzeStartTime)/1000).toFixed(0);
      if(s.state==='analyzing'){
        document.getElementById('analyzeStatusText').textContent=s.progress||'분석 중...';
        document.getElementById('analyzeDetailText').textContent=`${elapsed}초 경과`;
        // Animate bar
        const cur=parseFloat(document.getElementById('analyzeBar').style.width)||10;
        document.getElementById('analyzeBar').style.width=Math.min(cur+2,85)+'%';
        setTimeout(poll,1000);
      } else if(s.state==='done'&&s.result){
        analyzeSuccess(elapsed,s.result);
      } else if(s.state==='error'){
        analyzeError(s.error);
      } else {
        setTimeout(poll,1000);
      }
    }).catch(()=>setTimeout(poll,2000));
  };
  poll();
}

function analyzeSuccess(elapsed,result){
  document.getElementById('analyzeSpinner').style.display='none';
  document.getElementById('analyzeDoneIcon').style.display='block';
  document.getElementById('analyzeDoneIcon').textContent='✅';
  document.getElementById('analyzeTitle').textContent='분석 완료!';
  document.getElementById('analyzeBar').style.width='100%';
  document.getElementById('analyzeBar').style.background='#22c55e';
  document.getElementById('analyzeStatusText').textContent=`${result.clips?.length||0}개 클립 생성`;
  document.getElementById('analyzeDetailText').textContent=`${elapsed}초 소요`;
  document.getElementById('analyzeDoneBtn').style.display='inline-block';
  document.getElementById('analyzeDoneBtn').onclick=()=>{
    closeAnalyzeDialog();
    loadAnalyzeResult(result);
  };
}

function analyzeError(msg){
  document.getElementById('analyzeSpinner').style.display='none';
  document.getElementById('analyzeDoneIcon').style.display='block';
  document.getElementById('analyzeDoneIcon').textContent='❌';
  document.getElementById('analyzeTitle').textContent='분석 실패';
  document.getElementById('analyzeBar').style.width='100%';
  document.getElementById('analyzeBar').style.background='#ef4444';
  document.getElementById('analyzeStatusText').textContent=msg||'알 수 없는 오류';
  document.getElementById('analyzeDetailText').textContent='';
  document.getElementById('analyzeDoneBtn').style.display='inline-block';
  document.getElementById('analyzeDoneBtn').onclick=()=>closeAnalyzeDialog();
}

function closeAnalyzeDialog(){
  document.getElementById('analyzeOverlay').classList.remove('show');
}

function loadAnalyzeResult(result){
  CLIPS=result.clips||[];
  SUBS=result.subs||[];
  recalc();normSubs();
  normSubs();
  // Set project name from input
  currentProjectName=document.getElementById('projName').value||'새 프로젝트 '+new Date().toLocaleDateString('ko');
  currentProjectId='proj_'+Date.now();
  initEditorState();
  document.getElementById('srcOverlay').classList.add('hidden');
  document.title=`${currentProjectName} — Editor`;
  // Auto-save
  saveProject();
}

function initEditorState(){
  clipMeta=CLIPS.map(()=>({speed:1,transition:'none',transDur:0.3}));
  clipSubStyles=CLIPS.map(()=>({...subStyleDefault}));
  clipCrops=CLIPS.map(()=>({x:0,y:0,w:100,h:100}));
  clipZooms=CLIPS.map(()=>({scale:1,panX:0,panY:0}));
  hist=[];cur=0;
  restoreLastStyle();
  recalc();renderTL();
  if(CLIPS.length)sel(0);
